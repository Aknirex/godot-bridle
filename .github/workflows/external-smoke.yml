name: External API smoke tests

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    name: Protected provider smoke tests
    runs-on: ubuntu-latest
    environment: external-api-smoke
    timeout-minutes: 30
    env:
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      MESHY_API_KEY: ${{ secrets.MESHY_API_KEY }}
      EMBEDDING_API_KEY: ${{ secrets.EMBEDDING_API_KEY }}
      EMBEDDING_API_BASE: ${{ vars.EMBEDDING_API_BASE }}
      EMBEDDING_MODEL: ${{ vars.EMBEDDING_MODEL }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: "3.11"
      - name: Require protected provider secrets
        run: |
          test -n "$DEEPSEEK_API_KEY"
          test -n "$MESHY_API_KEY"
          test -n "$EMBEDDING_API_KEY"
          test -n "$EMBEDDING_API_BASE"
          test -n "$EMBEDDING_MODEL"
      - name: Install Python dependencies
        run: uv sync --frozen --extra dev --extra knowledge
      - name: Run opt-in provider smoke tests
        run: uv run pytest -q -m external_api

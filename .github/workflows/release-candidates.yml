name: Release candidates

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-candidates-${{ github.ref }}
  cancel-in-progress: false

jobs:
  linux:
    name: Linux AppImage and deb
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: desktop/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf
      - name: Install build dependencies
        run: |
          uv sync --frozen --extra packaging
          npm ci --prefix desktop
      - name: Build Linux bundles
        working-directory: desktop
        run: npm run tauri -- build --bundles appimage,deb
      - name: Check packaged Linux sidecar
        run: uv run --frozen python scripts/check-packaged-sidecar.py desktop/src-tauri/binaries/bridle-sidecar-x86_64-unknown-linux-gnu
      - name: Create checksums
        run: |
          find desktop/src-tauri/target/release/bundle -type f \
            \( -name '*.AppImage' -o -name '*.deb' \) -print0 \
            | sort -z \
            | xargs -0 sha256sum > desktop/src-tauri/target/release/bundle/SHA256SUMS-linux.txt
      - uses: actions/upload-artifact@v4
        with:
          name: godot-bridle-linux-${{ github.sha }}
          retention-days: 14
          if-no-files-found: error
          path: |
            desktop/src-tauri/target/release/bundle/appimage/*.AppImage
            desktop/src-tauri/target/release/bundle/deb/*.deb
            desktop/src-tauri/target/release/bundle/SHA256SUMS-linux.txt

  windows:
    name: Windows NSIS x64
    runs-on: windows-2022
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: desktop/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri
      - name: Install build dependencies
        shell: pwsh
        run: |
          uv sync --frozen --extra packaging
          npm ci --prefix desktop
      - name: Build Windows NSIS bundle
        working-directory: desktop
        run: npm run tauri -- build --bundles nsis
      - name: Check packaged Windows sidecar
        shell: pwsh
        run: uv run --frozen python scripts/check-packaged-sidecar.py desktop/src-tauri/binaries/bridle-sidecar-x86_64-pc-windows-msvc.exe
      - name: Create checksums
        shell: pwsh
        run: |
          $bundle = "desktop/src-tauri/target/release/bundle"
          $files = @(
            Get-ChildItem "$bundle/nsis/*.exe"
            Get-ChildItem "desktop/src-tauri/binaries/bridle-sidecar-*.exe"
          ) | Sort-Object FullName
          $lines = foreach ($file in $files) {
            $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $file.FullName).Hash.ToLowerInvariant()
            "$hash  $($file.FullName.Replace((Get-Location).Path + [IO.Path]::DirectorySeparatorChar, ''))"
          }
          $lines | Set-Content -Encoding ascii "$bundle/SHA256SUMS-windows.txt"
      - uses: actions/upload-artifact@v4
        with:
          name: godot-bridle-windows-${{ github.sha }}
          retention-days: 14
          if-no-files-found: error
          path: |
            desktop/src-tauri/target/release/bundle/nsis/*.exe
            desktop/src-tauri/binaries/bridle-sidecar-*.exe
            desktop/src-tauri/target/release/bundle/SHA256SUMS-windows.txt
